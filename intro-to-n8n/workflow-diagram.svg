      <text x="74" y="84" font-size="16" font-weight="700" text-anchor="middle" fill="#101828">RSS Read</text>
      <text x="74" y="108" font-size="12" text-anchor="middle" fill="#667085">Google News feed</text>
    </g>
    <g transform="translate(440 66)">
